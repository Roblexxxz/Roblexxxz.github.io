<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #1b1d1f; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .avatar-interface { display: flex; width: 100vw; height: 100vh; }
        
        .avatar-preview { 
            flex: 2; 
            background: radial-gradient(circle, #393b3d 0%, #232527 100%); 
            position: relative; 
        }
        #avatar-3d-container { width: 100%; height: 100%; }

        .avatar-sidebar { 
            flex: 1; 
            background: #2b2d2f; 
            border-left: 1px solid #444; 
            padding: 20px; 
            color: white; 
        }

        .item-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            margin-top: 20px; 
        }
        .item-card { 
            background: #3e4042; 
            padding: 10px; 
            border-radius: 8px; 
            text-align: center; 
            border: 2px solid transparent; 
        }
        .item-card:hover { border-color: #00b2ff; }
        
        .buy-btn { 
            background: #00b2ff; 
            color: white; 
            border: none; 
            padding: 8px; 
            width: 100%; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
        }

        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; 
            z-index: 999; 
        }
        .modal-content { background: #2b2d2f; padding: 30px; border-radius: 10px; width: 350px; text-align: center; }
        .modal-content input { 
            width: 90%; padding: 10px; margin: 10px 0; 
            background: #1b1d1f; border: 1px solid #444; color: white; 
        }
        .confirm-btn { background: #2ecc71; border: none; padding: 12px; width: 100%; color: white; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="avatar-interface">
    <div class="avatar-preview">
        <div id="avatar-3d-container"></div>
        <button style="position:absolute; bottom:20px; right:20px; padding:10px 20px; background:#2ecc71; color:white; border:none; border-radius:5px;" onclick="saveAvatar()">Save Character</button>
    </div>

    <div class="avatar-sidebar">
        <h2>Avatar Editor</h2>
        <div class="item-grid">
            <div class="item-card">
                <div style="height:80px; background:#555; margin-bottom:10px; border-radius:4px;"></div>
                <p>Bacon Hair</p>
                <button class="buy-btn" onclick="openPayment('bacon_hair')">100 R$</button>
            </div>
        </div>
    </div>
</div>

<div id="payment-modal" class="modal hidden">
    <div class="modal-content">
        <h2 style="color:white">Checkout</h2>
        <input type="text" placeholder="Card Number">
        <input type="text" placeholder="EXP (MM/YY)">
        <input type="text" placeholder="CVV">
        <button class="confirm-btn" onclick="processPurchase()">Confirm Purchase</button>
        <button style="background:none; border:none; color:#aaa; margin-top:10px; cursor:pointer;" onclick="closePayment()">Cancel</button>
    </div>
</div>

<script type="module">
    import { loadBaconHair } from './Assets/BaconHair.js';
    import { applyAnims } from './Animations/animations.js';

    let scene, camera, renderer, head, torso, charGroup;
    let currentUser = JSON.parse(localStorage.getItem('sessionUser'));
    let pendingItem = null;

    function init() {
        const container = document.getElementById('avatar-3d-container');
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        charGroup = new THREE.Group();
        
        const skinMat = new THREE.MeshLambertMaterial({ color: 0xffff00 });
        const torsoMat = new THREE.MeshLambertMaterial({ color: 0x00b2ff });

        head = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), skinMat);
        head.position.y = 1.3;
        
        torso = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.4, 0.6), torsoMat);
        
        const legGeo = new THREE.BoxGeometry(0.5, 1.2, 0.5);
        const leftLeg = new THREE.Mesh(legGeo, new THREE.MeshLambertMaterial({color: 0x1d6a06}));
        leftLeg.position.set(-0.35, -1.3, 0);
        const rightLeg = new THREE.Mesh(legGeo, new THREE.MeshLambertMaterial({color: 0x1d6a06}));
        rightLeg.position.set(0.35, -1.3, 0);

        charGroup.add(head, torso, leftLeg, rightLeg);
        scene.add(charGroup);

        if(currentUser.inventory.includes('bacon_hair')) {
            const hair = loadBaconHair();
            head.add(hair);
        }

        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(5, 5, 5);
        scene.add(light, new THREE.AmbientLight(0x404040));
        camera.position.z = 4;

        function animate() {
            requestAnimationFrame(animate);
            applyAnims({head, leftLeg, rightLeg, group: charGroup}, 'idle', Date.now());
            renderer.render(scene, camera);
        }
        animate();
    }

    window.openPayment = (id) => {
        pendingItem = id;
        document.getElementById('payment-modal').classList.remove('hidden');
    };

    window.closePayment = () => {
        document.getElementById('payment-modal').classList.add('hidden');
    };

    window.processPurchase = () => {
        if(!currentUser.inventory.includes(pendingItem)) {
            currentUser.inventory.push(pendingItem);
            const hair = loadBaconHair();
            head.add(hair);
        }
        localStorage.setItem('sessionUser', JSON.stringify(currentUser));
        updateMasterUserList();
        closePayment();
        alert("Success!");
    };

    window.saveAvatar = () => {
        localStorage.setItem('sessionUser', JSON.stringify(currentUser));
        updateMasterUserList();
        alert("Avatar Saved!");
    };

    function updateMasterUserList() {
        let users = JSON.parse(localStorage.getItem('users'));
        const idx = users.findIndex(u => u.username === currentUser.username);
        users[idx] = currentUser;
        localStorage.setItem('users', JSON.stringify(users));
    }

    init();
</script>
</body>
</html>

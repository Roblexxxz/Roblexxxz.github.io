<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testgame - Roblex</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #87ceeb;
            font-family: Arial, sans-serif;
        }
        #game-canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            z-index: 1000;
        }
        #loading.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="loading">
        <h2>Loading Baseplate...</h2>
        <p>Please wait while the game loads.</p>
    </div>
    <canvas id="game-canvas"></canvas>
    <script type="module" src="main.js"></script>
    <script>
        // Show loading timeout message after 10 seconds
        setTimeout(() => {
            const loadingDiv = document.getElementById('loading');
            if (loadingDiv && !loadingDiv.classList.contains('hidden')) {
                loadingDiv.innerHTML = `
                    <h2>Loading Taking Too Long</h2>
                    <p>The game may have failed to load.</p>
                    <p>Check the browser console (F12) for errors.</p>
                    <button onclick="location.reload()">Retry</button>
                `;
            }
        }, 10000);
    </script>
</body>
</html>

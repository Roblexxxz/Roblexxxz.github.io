<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox | Home</title>
    <style>
        body {
            background-color: #232527;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; color: white;
        }

        .container {
            background-color: #393b3d; padding: 30px; border-radius: 8px;
            width: 400px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Nav Bar */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            background: #191b1d; padding: 10px 20px; position: fixed;
            top: 0; width: 100%; box-sizing: border-box;
        }

        /* Utility */
        input {
            width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #111;
            border-radius: 4px; background-color: #191b1d; color: white; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 12px; margin-top: 10px; border: none;
            border-radius: 4px; font-weight: bold; cursor: pointer;
        }
        .primary-btn { background-color: #00b2ff; color: white; }
        .secondary-btn { background-color: transparent; border: 1px solid white; color: white; }
        .hidden { display: none !important; }

        /* Dashboard Styles */
        .friend-list { text-align: left; margin-top: 20px; border-top: 1px solid #555; padding-top: 10px; }
        .request-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .accept-btn { background: #00e676; width: auto; padding: 4px 8px; margin: 0; font-size: 11px; }
    </style>
</head>
<body>

    <!-- NAV BAR (Shown when logged in) -->
    <div id="nav" class="navbar hidden">
        <span>Roblex</span>
        <div>
            <span id="user-display" style="margin-right: 15px; font-weight: bold;"></span>
            <button id="logout-btn" style="width: auto; padding: 5px 10px; font-size: 12px; margin: 0;">Logout</button>
        </div>
    </div>

    <!-- AUTH SECTION (Login/Signup) -->
    <div id="auth-section" class="container">
        <img src="https://wikimedia.org" alt="logo" width="50" style="filter: invert(1); margin-bottom: 10px;">
        <h2 id="auth-title">Login to Roblox</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button id="login-btn" class="primary-btn">Log In</button>
        <button id="signup-btn" class="secondary-btn">Sign Up</button>
        <p id="status-msg" style="font-size: 14px; color: #ff5f5f;"></p>
    </div>

    <!-- HOME/DASHBOARD SECTION -->
    <div id="home-section" class="container hidden">
        <h1>Welcome Home!</h1>
        <p>This is your profile dashboard.</p>
        
        <div class="friend-list">
            <h3>Friend Requests</h3>
            <div id="request-container">
                <!-- Requests appear here -->
            </div>
            <p id="no-requests" style="color: #bbb; font-size: 13px;">No new requests.</p>
        </div>
    </div>

    <script>
        // DOM Elements
        const authSection = document.getElementById('auth-section');
        const homeSection = document.getElementById('home-section');
        const nav = document.getElementById('nav');
        const userDisplay = document.getElementById('user-display');
        const statusMsg = document.getElementById('status-msg');
        const requestContainer = document.getElementById('request-container');

        // Check for existing session on load
        window.onload = () => {
            const loggedInUser = localStorage.getItem('currentUser');
            if (loggedInUser) showDashboard(loggedInUser);
        };

        // SIGN UP Logic
        document.getElementById('signup-btn').onclick = () => {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            
            if (!user || !pass) return (statusMsg.textContent = "Fill all fields!");

            let users = JSON.parse(localStorage.getItem('users')) || [];
            if (users.find(u => u.user === user)) {
                return (statusMsg.textContent = "Username taken!");
            }

            users.push({ user, pass });
            localStorage.setItem('users', JSON.stringify(users));
            statusMsg.style.color = "#00e676";
            statusMsg.textContent = "Account created! Now Log In.";
        };

        // LOGIN Logic
        document.getElementById('login-btn').onclick = () => {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const users = JSON.parse(localStorage.getItem('users')) || [];

            const validUser = users.find(u => u.user === user && u.pass === pass);
            if (validUser) {
                localStorage.setItem('currentUser', user);
                showDashboard(user);
            } else {
                statusMsg.textContent = "Invalid username or password.";
            }
        };

        // LOGOUT Logic
        document.getElementById('logout-btn').onclick = () => {
            localStorage.removeItem('currentUser');
            location.reload();
        };

        function showDashboard(username) {
            authSection.classList.add('hidden');
            homeSection.classList.remove('hidden');
            nav.classList.remove('hidden');
            userDisplay.textContent = username;
            loadFriendRequests();
        }

        // FRIEND REQUEST Logic (Simulated)
        function loadFriendRequests() {
            const mockRequests = ["Builderman", "Stickmasterluke", "Guest 666"];
            document.getElementById('no-requests').classList.add('hidden');
            
            mockRequests.forEach(name => {
                const div = document.createElement('div');
                div.className = 'request-item';
                div.innerHTML = `
                    <span>${name}</span>
                    <button class="accept-btn" onclick="this.parentElement.remove()">Accept</button>
                `;
                requestContainer.appendChild(div);
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <img src="https://wikimedia.org" alt="logo" width="50">
        </div>
        <h2>Login to Roblox</h2>
        
        <div class="input-group">
            <input type="email" id="email-field" placeholder="Email / Username" required>
            <input type="password" id="pass-field" placeholder="Password" required>
        </div>

        <button id="login-btn">Log In</button>
        <div class="divider">or</div>
        <button id="signup-btn">Sign Up</button>

        <p id="status-msg"></p>
    </div>

    <!-- This links to your JavaScript -->
    <script type="module" src="app.js"></script>
</body>
</html>

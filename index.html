<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblex | Home</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <!-- NAV BAR (Top original style) -->
    <div id="nav" class="navbar hidden">
        <span>Roblex</span>
        <div>
            <span id="user-display" style="margin-right: 15px; font-weight: bold;"></span>
            <span id="balance-display" style="color: #00e676; margin-right: 15px;">R$: 0</span>
            <button id="logout-btn" class="nav-logout">Logout</button>
        </div>
    </div>

    <!-- MAIN WRAPPER FOR SIDEBAR + CONTENT -->
    <div class="wrapper">
        <!-- SIDEBAR (Matches original theme) -->
        <div id="sidebar" class="sidebar hidden">
            <button class="side-btn active" onclick="showTab('home')">Home</button>
            <button class="side-btn" onclick="showTab('games')">Games</button>
            <button class="side-btn" onclick="showTab('avatar')">Avatar</button>
            <button class="side-btn" onclick="showTab('inventory')">Inventory</button>
            <button class="side-btn" onclick="showTab('marketplace')">Marketplace</button>
        </div>

        <div class="content-area">
            <!-- AUTH SECTION -->
            <div id="auth-section" class="container">
                <img src="https://wikimedia.org" alt="logo" width="50" style="filter: invert(1); margin-bottom: 10px;">
                <h2 id="auth-title">Login to Roblex</h2>
                <input type="text" id="username" placeholder="Username">
                <input type="password" id="password" placeholder="Password">
                <button id="login-btn" class="primary-btn">Log In</button>
                <button id="signup-btn" class="secondary-btn">Sign Up</button>
                <p id="status-msg" style="font-size: 14px; color: #ff5f5f;"></p>
            </div>

            <!-- HOME TAB -->
            <div id="tab-home" class="container hidden">
                <h1>Find Users</h1>
                <input type="text" id="search-input" placeholder="Search username...">
                <button id="search-btn" class="primary-btn">Search</button>
                <div id="search-results" class="results-box hidden">
                    <p id="found-name"></p>
                    <button class="primary-btn" style="width: auto; padding: 5px 15px;">Add Friend</button>
                </div>
            </div>

            <!-- GAMES TAB -->
            <div id="tab-games" class="container hidden">
                <h1>Games</h1>
                <p style="color: #bbb;">No games yet. Tell me what to build!</p>
            </div>

            <!-- AVATAR TAB -->
            <div id="tab-avatar" class="container hidden">
                <h1>Avatar Editor</h1>
                <div id="avatar-3d-container"></div>
                <h3>Skin Tone</h3>
                <div class="color-row">
                    <div class="swatch" style="background:#ffdbac" onclick="changeColor(0xffdbac)"></div>
                    <div class="swatch" style="background:#e0ac69" onclick="changeColor(0xe0ac69)"></div>
                    <div class="swatch" style="background:#8d5524" onclick="changeColor(0x8d5524)"></div>
                </div>
            </div>

            <!-- MARKETPLACE TAB -->
            <div id="tab-marketplace" class="container hidden">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
                    <h1 style="margin:0;">Market</h1>
                    <button id="buy-roblex-btn" class="primary-btn" style="width:auto; padding: 10px;">+ Buy Roblex</button>
                </div>
                <div class="shop-grid">
                    <div class="item-card">
                        <span style="font-size: 40px;">🎩</span>
                        <p>Classic Hat</p>
                        <button onclick="buyItem('Top Hat', 100)" class="primary-btn">100 R$</button>
                    </div>
                </div>
            </div>

            <!-- INVENTORY TAB -->
            <div id="tab-inventory" class="container hidden">
                <h1>My Inventory</h1>
                <div id="inventory-list" class="shop-grid"></div>
            </div>
        </div>
    </div>

    <!-- PAYMENT MODAL -->
    <div id="pay-modal" class="modal hidden">
        <div class="container" style="max-width: 350px;">
            <h2>Purchase Roblex</h2>
            <select id="pay-amount">
                <option value="100">100 R$ - $0.99</option>
                <option value="1000">1000 R$ - $9.99</option>
                <option value="10000">10000 R$ - $99.99</option>
            </select>
            <input type="text" placeholder="Card Number">
            <button id="confirm-pay" class="primary-btn">Complete Purchase</button>
            <button id="close-modal" class="secondary-btn">Cancel</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
